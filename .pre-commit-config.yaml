repos:
  - repo: local
    hooks:
      - id: generate-wavelet-compile-db
        name: Generate tt-wavelet compile database
        entry: bash ./scripts/generate_compile_db.sh
        language: system
        pass_filenames: false
        files: ^tt-wavelet/.*\.(c|cc|cpp|cxx|h|hpp)$

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 23.10.1
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=100"]
        exclude: (^|/)tt-metal/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=100"]
        exclude: (^|/)tt-metal/

  - repo: https://github.com/cpp-linter/cpp-linter-hooks
    rev: v1.1.12
    hooks:
      - id: clang-format
        args: [--style=file, --version=20]
        files: ^tt-wavelet/.*\.(c|cc|cpp|cxx|h|hpp)$
      - id: clang-tidy
        args:
          [
            -p=build/ci-clang-tidy,
            --config-file=.clang-tidy,
            --exclude-header-filter=tt-wavelet/tt-metal/tt_metal/third_party/,
            --version=20,
            --extra-arg=-I/Users/nikitalenyk/Desktop/tt-wavelet/tt-metal/tt_metal/hw/inc/internal/tt-1xx/wormhole,
            --extra-arg=-I/Users/nikitalenyk/Desktop/tt-wavelet/tt-metal/tt_metal/hw/inc/internal/tt-1xx/wormhole/wormhole_b0_defines,
          ]
        files: ^tt-wavelet/.*\.(c|cc|cpp|cxx|hpp|h)$
        exclude: |
          (?x)^(
            tt-wavelet/ckernels/sfpu/ckernel_sfpu_stencil_affine\.h|
            tt-wavelet/ckernels/sfpu/ckernel_sfpu_stencil_mac\.h|
            tt-wavelet/kernels/include/stencil/api/stencil_mac\.h|
            tt-wavelet/kernels/include/stencil/llk/mac\.h|
            tt-wavelet/kernels/include/stencil/llk/params\.h|
            tt-wavelet/kernels/include/stencil/policy\.h|
            tt-wavelet/kernels/compute/compute\.cpp|
            tt-metal/tt_metal/third_party/tt_llk/tt_llk_wormhole_b0/common/inc/ckernel_instr_params\.h
          )$
